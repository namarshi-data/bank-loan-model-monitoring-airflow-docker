name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check src tests airflow/dags
      - name: Pytest
        run: python -m pytest
