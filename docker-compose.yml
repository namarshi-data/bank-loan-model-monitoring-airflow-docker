x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.10
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas numpy scipy scikit-learn SQLAlchemy psycopg2-binary PyYAML joblib requests"
    DATABASE_URL: postgresql+psycopg2://mlops:mlops_password@postgres:5432/loan_monitoring
    PYTHONPATH: /opt/airflow/project/src
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./src:/opt/airflow/project/src
    - ./config:/opt/airflow/project/config
    - ./data:/opt/airflow/project/data
    - ./models:/opt/airflow/project/models
    - ./reports:/opt/airflow/project/reports
    - ./scripts:/opt/airflow/project/scripts
    - ./database:/opt/airflow/project/database
  depends_on:
    airflow-db:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: loan_monitoring
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlops -d loan_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-db:
    image: postgres:15
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
